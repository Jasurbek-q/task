<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task Manager{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
        nav { background: #2c3e50; padding: 14px 30px; display: flex; justify-content: space-between; align-items: center; }
        nav a, nav button.logout-btn { color: #ecf0f1; text-decoration: none; font-weight: 500; margin-left: 20px; background: none; border: none; font-family: inherit; font-size: inherit; cursor: pointer; padding: 0; }
        nav a:hover, nav button.logout-btn:hover { color: #3498db; }
        nav .brand { font-size: 1.3rem; font-weight: 700; color: #3498db; margin-left: 0; }
        .container { max-width: 960px; margin: 30px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .btn { display: inline-block; padding: 9px 20px; border-radius: 6px; font-size: 0.9rem; font-weight: 500; text-decoration: none; cursor: pointer; border: none; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        .messages { margin-bottom: 20px; }
        .messages .alert { padding: 12px 18px; border-radius: 6px; margin-bottom: 8px; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: #3498db;
        }
        .form-errors { color: #e74c3c; font-size: 0.85rem; margin-top: 4px; }
        /* Logout formasi uchun qo'shimcha stil */
        .logout-form { display: inline; }
    </style>
</head>
<body>
<nav>
    <a href="/" class="brand">✅ TaskManager</a>
    <div>
        {% if user.is_authenticated %}
            <span style="color:#bdc3c7">Hello, {{ user.username }}</span>
            <a href="{% url 'task_create' %}">+ New Task</a>

            <form action="{% url 'logout' %}" method="post" class="logout-form">
                {% csrf_token %}
                <button type="submit" class="logout-btn">Logout</button>
            </form>

        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </div>
</nav>
<div class="container">
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
