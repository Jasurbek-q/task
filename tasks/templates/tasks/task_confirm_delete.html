{% extends 'tasks/base.html' %}
{% block title %}Delete Task{% endblock %}
{% block content %}
<div class="card" style="max-width:480px; margin:0 auto; text-align:center; padding:32px;">
    <h2 style="margin-bottom:12px;">Delete Task?</h2>
    <p style="color:#555; margin-bottom:24px;">Are you sure you want to delete <strong>"{{ task.title }}"</strong>? This cannot be undone.</p>
    <form method="post" style="display:flex; gap:12px; justify-content:center;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'task_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
