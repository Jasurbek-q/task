{% extends 'tasks/base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="card" style="max-width:440px; margin:0 auto;">
    <h1 style="font-size:1.4rem; margin-bottom:24px; text-align:center;">Create Account</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="form-errors">{{ field.errors }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary" style="width:100%; padding:11px;">Register</button>
    </form>
    <p style="text-align:center; margin-top:16px; font-size:0.9rem; color:#888;">
        Already have an account? <a href="{% url 'login' %}">Login</a>
    </p>
</div>
{% endblock %}
